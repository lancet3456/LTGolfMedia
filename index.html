<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>LT Golf Media™ Live Card</title>
  <link rel="preload" href="styles.css" as="style" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="card-screen">
  <main class="phone-stage">
    <section class="live-card" aria-label="LT Golf Media live trading card">
      <div class="foil foil-1"></div>
      <div class="foil foil-2"></div>
      <div class="card-border"></div>

      <header class="card-header">
        <div class="brand-row">
          <div class="brand-mark">LT</div>
          <div class="brand-copy">
            <div class="eyebrow">LIVE TRADING CARD</div>
            <h1>LT Golf Media™</h1>
          </div>
        </div>
        <div class="status-chip">SCAN ACTIVE</div>
      </header>

      <section class="hero-panel">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="player-tag">FEATURED ROUND</div>
          <h2 class="player-name">Your Client Name</h2>
          <p class="course-line">Painted Dunes Golf Course · El Paso, Texas</p>
        </div>
      </section>

      <section class="info-grid">
        <article class="info-box">
          <div class="info-label">FORMAT</div>
          <div class="info-value">Legend Loop™</div>
        </article>
        <article class="info-box">
          <div class="info-label">DROP</div>
          <div class="info-value">Founding Series</div>
        </article>
        <article class="info-box">
          <div class="info-label">ACCESS</div>
          <div class="info-value">Photos + Video</div>
        </article>
      </section>

      <section class="scan-section">
        <div class="scan-copy">
          <div class="scan-title">Tap the digital QR</div>
          <div class="scan-subtitle">to enter the cinematic reveal</div>
        </div>

        <a class="qr-hotspot" href="reveal.html" aria-label="Open scan reveal">
          <div class="qr-frame">
            <div class="qr-corners tl"></div>
            <div class="qr-corners tr"></div>
            <div class="qr-corners bl"></div>
            <div class="qr-corners br"></div>
            <div class="qr-grid">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <div class="tap-ring"></div>
        </a>
      </section>

      <footer class="card-footer">
        <div class="serial">CARD 001 · LIVE PROTOTYPE</div>
        <div class="legend">SCAN · REVEAL · REMEMBER</div>
      </footer>
    </section>
  </main>
</body>
</html>
